<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOKA | Sistema de Inventario</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- LOGO -->
            <div class="auth-header">
                <img src="assets/img2.jpeg" alt="MOKA">
                <h2>Sistema de Inventario</h2>
            </div>

            <!-- TABS -->
            <div class="auth-tabs">
                <button class="tab active" onclick="showLogin()">Ingresar</button>
                <!--<button class="tab" onclick="showRegister()">Registrarse</button>-->
            </div>

            <!-- LOGIN -->
            <form id="loginForm" class="form-section active">
                <div class="input-group">
                    <i class="fa fa-envelope icon-left"></i>
                    <input type="email" id="lcorreo" placeholder="Correo electrónico">
                </div>

                <div class="input-group password-group">
                    <i class="fa fa-lock icon-left"></i>
                    <input type="password" id="lcontrasena" placeholder="Contraseña">
                    <i class="fa fa-eye toggle-password icon-right"></i>
                </div>

                <button type="submit" class="btn-primary">Ingresar</button>
            </form>

            <!-- REGISTRO -->
            <form id="registerForm" class="form-section">
                <div class="input-group">
                    <i class="fa fa-id-card icon-left"></i>
                    <input type="text" id="identificacion" placeholder="Número de documento">
                </div>
                <div class="input-group">
                    <i class="fa fa-user icon-left"></i>
                    <input type="text" id="nombre" placeholder="Nombre completo">
                </div>

                <div class="input-group">
                    <i class="fa fa-envelope icon-left"></i>
                    <input type="email" id="correo" placeholder="Correo electrónico">
                </div>

                <div class="input-group password-group">
                    <i class="fa fa-lock icon-left"></i>
                    <input type="password" id="contrasena" placeholder="Contraseña">
                    <i class="fa fa-eye toggle-password icon-right"></i>
                </div>

                <div class="input-group">
                    <i class="fa fa-user-tag icon-left"></i>
                    <select id="roleSelect">
                        <option value="">Cargando roles...</option>
                    </select>
                </div>            

                <button type="submit" class="btn-primary">Crear cuenta</button>
            </form>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.querySelectorAll('.tab')[1].classList.remove('active');
        }

        function showRegister() {
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.querySelectorAll('.tab')[0].classList.remove('active');
        }
    </script>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
